global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'medsecure-backend'
    metrics_path: /metrics
    static_configs:
      - targets: ['medsecure-backend:5000']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
