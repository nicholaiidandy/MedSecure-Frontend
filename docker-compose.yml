services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medsecure-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://db:27017/medsecure
    depends_on:
      - db
    expose:
      - "5000"
    networks:
      - medsecure_net

  frontend-builder:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: output
    container_name: medsecure-frontend-builder
    volumes:
      - frontend-dist:/app/dist
    networks:
      - medsecure_net

  db:
    image: mongo:6
    container_name: medsecure-db
    restart: unless-stopped
    volumes:
      - dbdata:/data/db
    ports:
      - "27017:27017"
    networks:
      - medsecure_net

  prometheus:
    image: prom/prometheus:latest
    container_name: medsecure-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"
    networks:
      - medsecure_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: medsecure-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    ports:
      - "8081:8080"
    depends_on:
      - backend
      - frontend-builder
      - db
      - prometheus
      - grafana
      - jenkins
    networks:
      - medsecure_net

  grafana:
    image: grafana/grafana:9.5.0
    container_name: medsecure-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: 03112004d
      GF_SERVER_DOMAIN: monitoring.medsecure
      GF_SERVER_ROOT_URL: https://monitoring.medsecure/
      GF_SERVER_ENFORCE_DOMAIN: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_ANGULAR_SUPPORT_ENABLED: "true"
    ports:
      - "3001:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./monitoring/grafana/datasources/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./monitoring/grafana/provisioning/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - medsecure_net

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: medsecure-jenkins
    restart: unless-stopped
    expose:
      - "8080"
      - "50000"
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false -Djenkins.model.JenkinsLocationConfiguration.url=https://jenkins.medsecure/ -Djenkins.model.JenkinsCrumbs.disableCSRFCheck=true"
    volumes:
      - jenkins_home:/var/jenkins_home
      - ./jenkins/init.groovy.d:/usr/share/jenkins/ref/init.groovy.d:ro
    networks:
      - medsecure_net

  nginx:
    build:
      context: ./nginx
    container_name: medsecure-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend-builder
      - grafana
      - jenkins
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - frontend-dist:/usr/share/nginx/html:ro
    networks:
      - medsecure_net

networks:
  medsecure_net:
    driver: bridge

volumes:
  dbdata:
  grafana-storage:
  jenkins_home:
  frontend-dist: