# Nginx Reverse Proxy + TLS for MedSecure
# Backend: Express on port 5000
# Frontend: Vite dev server on port 5173
# Uses standard ports 80/443

pid /tmp/nginx-medsecure.pid;

events {
    worker_connections 1024;
}

http {
    error_log /tmp/nginx-medsecure-error.log;
    access_log /tmp/nginx-medsecure-access.log;

    # --- HTTP: Redirect all to HTTPS ---
    server {
        listen 80;
        server_name localhost medsecure.local medsecure.com www.medsecure.com;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Redirect all HTTP traffic to HTTPS
        return 301 https://$host$request_uri;
    }

    # --- HTTPS: Main Server ---
    server {
        listen 443 ssl http2;
        server_name localhost medsecure.local medsecure.com www.medsecure.com;

        # TLS Configuration
        ssl_certificate     /home/devsecops/DevSecOps/MedSecure/nginx/ssl/medsecure.crt;
        ssl_certificate_key /home/devsecops/DevSecOps/MedSecure/nginx/ssl/medsecure.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # === API Proxy (Express backend) ===
        location /api/ {
            proxy_pass         http://127.0.0.1:5000;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Critical: allow cookies
            proxy_set_header   Cookie            $http_cookie;
            proxy_pass_header  Set-Cookie;

            # WebSocket support
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            client_max_body_size 50M;
        }

        # === Frontend Proxy (Vite dev server) ===
        location / {
            proxy_pass         http://127.0.0.1:5173;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket support for Vite HMR
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
