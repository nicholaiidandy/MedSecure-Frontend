# Nginx Reverse Proxy + TLS for MedSecure


pid /tmp/nginx-medsecure.pid;

events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}
    # Docker DNS resolver for service discovery
    resolver 127.0.0.11:53 valid=10s;
    resolver_timeout 5s;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;
    # more_clear_headers Server;
    # more_set_headers "Server: MedSecure";

    error_log /tmp/nginx-medsecure-error.log;
    access_log /tmp/nginx-medsecure-access.log;

    server {
        listen 80;
        server_name medsecure localhost medsecure.local medsecure.com www.medsecure.com;

        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests;" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;

        return 301 https://$host$request_uri;
    }

server {
        listen 443 ssl http2 default_server;
        server_name medsecure localhost medsecure.local medsecure.com www.medsecure.com;

        ssl_certificate     /etc/nginx/ssl/medsecure.crt;
        ssl_certificate_key /etc/nginx/ssl/medsecure.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
ssl_prefer_server_ciphers on;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # CSP disabled - add 'unsafe-eval' if needed for libs
        # add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'unsafe-eval'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests;" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;

        location = /robots.txt {
            default_type text/plain;
            return 200 "User-agent: *\nDisallow:\n";
        }

        location = /sitemap.xml {
            default_type application/xml;
            return 200 "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<urlset xmlns=\"http://www.sitemaps.org/schemas/sitemap/0.9\">\n  <url><loc>https://medsecure.com/</loc></url>\n</urlset>\n";
        }

        location /api/ {
            set $backend_upstream http://backend:5000;
            proxy_pass         $backend_upstream;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   Cookie            $http_cookie;
            proxy_hide_header  Server;
            proxy_hide_header  X-Powered-By;
            proxy_pass_header  Set-Cookie;

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
            client_max_body_size 50M;
        }

        location = /assets {
            default_type text/plain;
            return 404 "Not found\n";
        }

        location /assets/ {
            alias /usr/share/nginx/html/assets/;
            try_files $uri =404;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        }

        location /health {
            access_log off;
            default_type text/plain;
            return 200 "healthy\n";
        }

        error_page 404 /index.html;
        location = /404.txt {
            internal;
            default_type text/plain;
            return 404 "Not found\n";
        }

        error_page 500 502 503 504 /50x.txt;
        location = /50x.txt {
            internal;
            default_type text/plain;
            return 500 "Service unavailable\n";
        }
    }

    server {
        listen 80;
        server_name jenkins.medsecure;
        return 301 https://$host$request_uri;
    }

    server {
    listen 443 ssl http2;
    server_name jenkins.medsecure;

    ssl_certificate     /etc/nginx/ssl/medsecure.crt;
    ssl_certificate_key /etc/nginx/ssl/medsecure.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://jenkins:8080;
        proxy_http_version 1.1;

        proxy_request_buffering off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}                                                                                                                                                                                                                           

    server {
        listen 80;
        server_name monitoring.medsecure;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name monitoring.medsecure;

        ssl_certificate     /etc/nginx/ssl/medsecure.crt;
        ssl_certificate_key /etc/nginx/ssl/medsecure.key;
        ssl_protocols       TLSv1.2 TLSv1.3;                    
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Allow embedding from medsecure.com
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' ws: wss:; frame-ancestors 'self' https://medsecure.com https://monitoring.medsecure; form-action 'self';" always;
        add_header X-Frame-Options "ALLOW-FROM https://medsecure.com https://monitoring.medsecure" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        set $grafana_upstream http://grafana:3000;

        location / {
            proxy_pass         $grafana_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_hide_header  Server;
            proxy_hide_header  X-Powered-By;
            proxy_hide_header  X-Frame-Options;
            proxy_hide_header  Content-Security-Policy;
            proxy_read_timeout 90s;
        }
    }
}
