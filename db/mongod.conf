# MongoDB Config for MedSecure Local Dev
# Usage: cd MedSecure && mongod --config ./db/mongod.conf --fork

storage:
  dbPath: /home/devsecops/DevSecOps/MedSecure/db
  engine: wiredTiger
  wiredTiger:
    engineConfig:
      cacheSizeGB: 1

systemLog:
  destination: file
  logAppend: true
  path: /home/devsecops/DevSecOps/MedSecure/db/mongod.log
  logRotate: rename
  timeStampFormat: iso8601-utc

net:
  port: 27017
  bindIp: 127.0.0.1
  ipv6: false

processManagement:
  fork: false  # Set --fork flag when starting
  pidFilePath: /home/devsecops/DevSecOps/MedSecure/db/mongod.pid

security:
  authorization: disabled  # Enable later if needed

operationProfiling:
  mode: slowOpOnly
  slowOpThresholdMs: 100

replication: {}
sharding: {}
